<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>item_showcase</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: __BG_COLOR__; }
  .stage { position: relative; width: 512px; height: 512px; display: flex; align-items: center; justify-content: center; perspective: 600px; }
  .frame {
    width: 220px; height: 220px; border-radius: 28px;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border: 3px solid __PRIMARY__;
    box-shadow: 0 0 40px __PRIMARY__, inset 0 0 20px rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    animation: itemFloat __DURATION_S__ ease-in-out infinite;
  }
  .item {
    width: 130px; height: 130px;
    background: linear-gradient(180deg, __ACCENT__ 0%, __PRIMARY__ 100%);
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    box-shadow: inset 0 6px 14px rgba(255,255,255,0.45), inset 0 -10px 18px rgba(0,0,0,0.4);
    transform-origin: center;
    animation: itemSpin __DURATION_S__ linear infinite;
  }
  .glow {
    position: absolute; width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, __ACCENT__ 0%, transparent 70%);
    opacity: 0.35;
    animation: glowPulse __DURATION_S__ ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes itemFloat {
    0%   { transform: translateY(40px) rotateX(20deg) scale(0.8); opacity: 0; }
    25%  { transform: translateY(-10px) rotateX(0deg) scale(1.05); opacity: 1; }
    50%  { transform: translateY(0px) rotateX(0deg) scale(1.0); }
    75%  { transform: translateY(-8px) rotateX(0deg) scale(1.02); }
    100% { transform: translateY(0px) rotateX(0deg) scale(1.0); }
  }
  @keyframes itemSpin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.20; transform: scale(0.9); }
    50%      { opacity: 0.45; transform: scale(1.1); }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>
  <div class="frame">
    <div class="item"></div>
  </div>
</div>
</body>
</html>
