<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>emoji_motion</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: __BG_COLOR__; }
  .stage { position: relative; width: 512px; height: 512px; display: flex; align-items: center; justify-content: center; }
  .face {
    width: 240px; height: 240px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff2a8 0%, __PRIMARY__ 60%, #b88a00 100%);
    box-shadow: 0 16px 32px rgba(0,0,0,0.5), inset 0 -12px 18px rgba(0,0,0,0.18);
    position: relative;
    animation: emojiBounce __DURATION_S__ cubic-bezier(.3,.7,.3,1) infinite;
  }
  .eye {
    position: absolute; top: 80px; width: 32px; height: 40px; border-radius: 50%;
    background: #1a1a1a;
  }
  .eye.l { left: 60px; }
  .eye.r { right: 60px; }
  .mouth {
    position: absolute; bottom: 56px; left: 50%;
    width: 120px; height: 60px; transform: translateX(-50%);
    border-bottom-left-radius: 60px 60px;
    border-bottom-right-radius: 60px 60px;
    background: #1a1a1a;
    overflow: hidden;
  }
  .mouth::after {
    content: ""; position: absolute; bottom: 0; left: 10px; right: 10px; height: 18px;
    background: #ff5d6c; border-radius: 0 0 60px 60px;
  }
  @keyframes emojiBounce {
    0%   { transform: translateY(60px) scale(0.7); opacity: 0; }
    20%  { transform: translateY(-30px) scale(1.08); opacity: 1; }
    40%  { transform: translateY(0px) scale(1.0); }
    55%  { transform: translateY(-22px) scale(1.05); }
    72%  { transform: translateY(0px) scale(1.0); }
    100% { transform: translateY(0px) scale(1.0); }
  }
  .sparkle {
    position: absolute; width: 14px; height: 14px;
    background: __ACCENT__; transform: rotate(45deg);
    box-shadow: 0 0 10px __ACCENT__;
    opacity: 0;
    animation: sparklePop __DURATION_S__ ease-out infinite;
  }
  @keyframes sparklePop {
    0%, 30% { opacity: 0; transform: translate(0,0) rotate(45deg) scale(0.3); }
    50%     { opacity: 1; transform: translate(var(--dx), var(--dy)) rotate(45deg) scale(1.0); }
    80%     { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(45deg) scale(0.6); }
    100%    { opacity: 0; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="face">
    <div class="eye l"></div>
    <div class="eye r"></div>
    <div class="mouth"></div>
  </div>
  <div class="sparkle" style="--dx: 130px; --dy: -90px;"></div>
  <div class="sparkle" style="--dx:-140px; --dy: -60px;"></div>
  <div class="sparkle" style="--dx: 140px; --dy:  80px;"></div>
  <div class="sparkle" style="--dx:-130px; --dy: 100px;"></div>
</div>
</body>
</html>
