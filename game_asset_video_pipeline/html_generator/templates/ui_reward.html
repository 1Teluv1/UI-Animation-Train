<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ui_reward</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: __BG_COLOR__; }
  .stage { position: relative; width: 512px; height: 512px; display: flex; align-items: center; justify-content: center; }
  .coin {
    width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff5b8 0%, __PRIMARY__ 45%, #7a4f00 100%);
    box-shadow: 0 12px 28px rgba(0,0,0,0.55), inset 0 -10px 18px rgba(0,0,0,0.35), inset 0 8px 14px rgba(255,255,255,0.55);
    position: relative;
    animation: coinPop __DURATION_S__ cubic-bezier(.2,.8,.2,1) infinite;
  }
  .coin::after {
    content: ""; position: absolute; inset: 24px; border-radius: 50%;
    border: 6px solid rgba(122,79,0,0.55);
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18), transparent 60%);
  }
  @keyframes coinPop {
    0%   { transform: translateY(40px) scale(0.6) rotateY(0deg); opacity: 0; }
    18%  { transform: translateY(-90px) scale(1.15) rotateY(180deg); opacity: 1; }
    45%  { transform: translateY(0px) scale(1.0) rotateY(540deg); }
    60%  { transform: translateY(-20px) scale(1.04) rotateY(720deg); }
    80%  { transform: translateY(0px) scale(1.0) rotateY(720deg); }
    100% { transform: translateY(0px) scale(1.0) rotateY(720deg); }
  }
  .spark {
    position: absolute; width: 10px; height: 10px; border-radius: 50%;
    background: __ACCENT__;
    box-shadow: 0 0 12px __ACCENT__;
    opacity: 0;
    animation: sparkBurst __DURATION_S__ ease-out infinite;
  }
  @keyframes sparkBurst {
    0%, 35% { transform: translate(0,0) scale(0.4); opacity: 0; }
    45%     { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 1; }
    75%     { transform: translate(calc(var(--dx) * 1.3), calc(var(--dy) * 1.3)) scale(0.6); opacity: 0; }
    100%    { opacity: 0; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="coin"></div>
  <div class="spark" style="--dx:  90px; --dy: -80px;"></div>
  <div class="spark" style="--dx: -90px; --dy: -70px;"></div>
  <div class="spark" style="--dx: 100px; --dy:  60px;"></div>
  <div class="spark" style="--dx: -80px; --dy:  90px;"></div>
  <div class="spark" style="--dx:   0px; --dy:-110px;"></div>
  <div class="spark" style="--dx:   0px; --dy: 110px;"></div>
</div>
</body>
</html>
