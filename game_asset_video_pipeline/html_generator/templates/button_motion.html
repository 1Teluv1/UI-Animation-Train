<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>button_motion</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: __BG_COLOR__; }
  .stage { position: relative; width: 512px; height: 512px; display: flex; align-items: center; justify-content: center; }
  .btn {
    width: 280px; height: 110px; border-radius: 28px;
    background: linear-gradient(180deg, __ACCENT__ 0%, __PRIMARY__ 100%);
    box-shadow:
      0 10px 0 rgba(0,0,0,0.35),
      0 18px 30px rgba(0,0,0,0.5),
      inset 0 -8px 0 rgba(0,0,0,0.25),
      inset 0 8px 0 rgba(255,255,255,0.35);
    position: relative;
    animation: btnPress __DURATION_S__ cubic-bezier(.3,.7,.3,1) infinite;
  }
  .btn::before {
    content: ""; position: absolute; inset: 8px 16px auto 16px; height: 28px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.0));
    pointer-events: none;
  }
  .ripple {
    position: absolute; width: 80px; height: 80px; border-radius: 50%;
    border: 4px solid __ACCENT__;
    opacity: 0;
    animation: ripple __DURATION_S__ ease-out infinite;
  }
  @keyframes btnPress {
    0%   { transform: scale(0.2); opacity: 0; }
    18%  { transform: scale(1.12); opacity: 1; }
    32%  { transform: scale(0.94) translateY(8px); }
    50%  { transform: scale(1.0) translateY(0); }
    72%  { transform: scale(0.96) translateY(6px); }
    88%  { transform: scale(1.02) translateY(-2px); }
    100% { transform: scale(1.0) translateY(0); }
  }
  @keyframes ripple {
    0%, 28% { transform: scale(0.5); opacity: 0; }
    35%     { transform: scale(0.8); opacity: 0.9; }
    65%     { transform: scale(2.6); opacity: 0; }
    100%    { opacity: 0; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="ripple"></div>
  <div class="btn"></div>
</div>
</body>
</html>
